name: Aikya Dual Deploy (Vercel + Firebase) — Lockless & Error-Proof

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"   # optional: har 30 min

permissions:
  contents: read

concurrency:
  group: dual-deploy
  cancel-in-progress: false

env:
  # ---- Vercel ----
  VERCEL_TOKEN:     ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID:    ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID:${{ secrets.VERCEL_PROJECT_ID }}
  # ---- Firebase (choose one auth path) ----
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }} # full JSON text (optional)
  FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_TOKEN:           ${{ secrets.FIREBASE_TOKEN }}           # optional alternative

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      has_pkg:   ${{ steps.scan.outputs.has_pkg }}
      has_build: ${{ steps.scan.outputs.has_build }}
      vercel_ok: ${{ steps.scan.outputs.vercel_ok }}
      fb_auth:   ${{ steps.scan.outputs.fb_auth }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan repo & env (no secrets revealed)
        id: scan
        shell: bash
        run: |
          set -e
          echo "== Files (top) =="; ls -la | head -n 200

          # package.json?
          if [ -f package.json ]; then
            echo "has_pkg=true"  >> "$GITHUB_OUTPUT"
            # build script?
            if jq -e '.scripts.build' package.json >/dev/null; then
              echo "has_build=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_build=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_pkg=false"  >> "$GITHUB_OUTPUT"
            echo "has_build=false" >> "$GITHUB_OUTPUT"
          fi

          # vercel creds present?
          if [ -n "${VERCEL_TOKEN}" ] && [ -n "${VERCEL_ORG_ID}" ] && [ -n "${VERCEL_PROJECT_ID}" ]; then
            echo "vercel_ok=true"  >> "$GITHUB_OUTPUT"
          else
            echo "vercel_ok=false" >> "$GITHUB_OUTPUT"
          fi

          # firebase auth which?
          if [ -n "${FIREBASE_SERVICE_ACCOUNT}" ] && [ -n "${FIREBASE_PROJECT_ID}" ]; then
            echo "fb_auth=sa" >> "$GITHUB_OUTPUT"
          elif [ -n "${FIREBASE_TOKEN}" ] && [ -n "${FIREBASE_PROJECT_ID}" ]; then
            echo "fb_auth=token" >> "$GITHUB_OUTPUT"
          else
            echo "fb_auth=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Preflight summary
        run: |
          echo "### Preflight" >> $GITHUB_STEP_SUMMARY
          echo "- package.json:  ${{ steps.scan.outputs.has_pkg }}"  >> $GITHUB_STEP_SUMMARY
          echo "- build script:  ${{ steps.scan.outputs.has_build }}" >> $GITHUB_STEP_SUMMARY
          echo "- vercel creds:  ${{ steps.scan.outputs.vercel_ok }}" >> $GITHUB_STEP_SUMMARY
          echo "- firebase auth: ${{ steps.scan.outputs.fb_auth }}"   >> $GITHUB_STEP_SUMMARY

  build:
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.has_pkg == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node (no lockfile required)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps (lockless)
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund || true
          else
            npm install --no-audit --no-fund || true
          fi
      - name: Build (best-effort)
        shell: bash
        run: |
          if jq -e '.scripts.build' package.json >/dev/null 2>&1; then
            npm run build || echo "Build failed; continuing."
          else
            echo "No build script; continuing."
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: [preflight, build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node for CLIs
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------- Vercel Deploy (conditional) ----------
      - name: Vercel Deploy
        if: ${{ needs.preflight.outputs.vercel_ok == 'true' }}
        shell: bash
        run: |
          set -e
          echo "▶ Vercel deploy..."
          npx -y vercel pull --yes --environment=production \
            --token "${VERCEL_TOKEN}" --scope "${VERCEL_ORG_ID}" || true
          # If you built above, you can do prebuilt; else direct deploy
          npx -y vercel deploy --prod --yes \
            --token "${VERCEL_TOKEN}" --scope "${VERCEL_ORG_ID}" \
            --project "${VERCEL_PROJECT_ID}" || true
          echo "✅ Vercel step finished"

      - name: Skip Vercel (no creds)
        if: ${{ needs.preflight.outputs.vercel_ok != 'true' }}
        run: echo "⏭️ Skipping Vercel (missing secrets)."

      # ---------- Firebase Hosting (conditional) ----------
      - name: Firebase Deploy via Service Account
        if: ${{ needs.preflight.outputs.fb_auth == 'sa' }}
        shell: bash
        run: |
          set -e
          echo "▶ Firebase deploy (service account)..."
          echo '${{ env.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/fb.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/fb.json"
          npx -y firebase-tools --version >/dev/null 2>&1 || npm i -g firebase-tools
          firebase deploy --only hosting --project "${FIREBASE_PROJECT_ID}" || true
          echo "✅ Firebase (SA) finished"

      - name: Firebase Deploy via Token
        if: ${{ needs.preflight.outputs.fb_auth == 'token' }}
        shell: bash
        run: |
          set -e
          echo "▶ Firebase deploy (token)..."
          npx -y firebase-tools --version >/dev/null 2>&1 || npm i -g firebase-tools
          firebase deploy --only hosting --project "${FIREBASE_PROJECT_ID}" --token "${FIREBASE_TOKEN}" || true
          echo "✅ Firebase (token) finished"

      - name: Skip Firebase
        if: ${{ needs.preflight.outputs.fb_auth == 'none' }}
        run: echo "⏭️ Skipping Firebase (no auth configured)."

      # ---------- Summary ----------
      - name: Summary
        run: |
          echo "### Dual Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lockfile: not required (install handled)" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: attempted if creds present" >> $GITHUB_STEP_SUMMARY
          echo "- Firebase: attempted if auth present" >> $GITHUB_STEP_SUMMARY

default_platform(:android)

platform :android do
  desc "Build release AAB"
  lane :build_aab do |_options|
    gradle(task: "bundle", build_type: "Release")
  end

  desc "Upload AAB to Closed testing (internal/alpha/beta)"
  lane :deploy_closed do |options|
    aab = options[:aab_path] || Dir["**/build/outputs/bundle/release/*.aab"].first
    UI.user_error!("AAB not found") unless aab

    supply(
      json_key_data: ENV["ANDROID_JSON_KEY"],
      package_name:  ENV["ANDROID_PACKAGE_NAME"],
      track:         ENV.fetch("TRACK_DEFTRACK_DEFAULT", "internal"),
      aab:           aab,
      mapping:       Dir["**/build/outputs/mapping/release/mapping.txt"].first,
      release_status: "completed",
      release_notes: [{ locale: "en-US", text: ENV.fetch("RELEASE_NOTES_EN", "Automated build") }]
    )
  end

  desc "Promote existing release to Production"
  lane :promote_to_prod do |_options|
    supply(
      json_key_data: ENV["ANDROID_JSON_KEY"],
      package_name:  ENV["ANDROID_PACKAGE_NAME"],
      track:         "production",
      rollout:       1.0
    )
  end

  desc "Build -> Closed testing -> Production"
  lane :deploy_production do |options|
    aab = options[:aab_path]
    if aab.nil? || aab.empty?
      build_aab
      aab = Dir["**/build/outputs/bundle/release/*.aab"].first
    end
    deploy_closed(aab_path: aab)
    promote_to_prod
  end
end

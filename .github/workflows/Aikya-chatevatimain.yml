on:
  workflow_dispatch: {}   # TEMP disable automatic triggers
# push:
#   branches: [ main ]
# schedule:
#   - cron: "..."# ---------------- Firebase deploy (optional) ----------------
  firebase_deploy:
    if: ${{ vars.DO_FIREBASE_DEPLOY == '1' }}
    needs: autopilot
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Write Firebase service account
        run: |
          echo '${{ secrets.FIREBASE_SA }}' > sa.json

      - name: Install firebase-tools
        run: npm i -g firebase-tools

      - name: Deploy Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/sa.json
        run: |
          firebase use --add || true
          firebase deploy --only hosting --non-interactive --project "$(jq -r .project_id sa.json)"

  # ---------------- Android build (optional) ----------------
  android_build:
    if: ${{ vars.DO_ANDROID_BUILD == '1' }}
    needs: autopilot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Optional signing; if secrets are missing we just build unsigned
      - name: Restore keystore (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Gradle build (.aab)
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean bundleRelease

      - name: Sign .aab (optional)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          AAB=$(find . -name "*release.aab" | head -n1)
          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks -storepass "$STOREPASS" -keypass "$KEYPASS" \
            "$AAB" "$ALIAS"
        env:
          STOREPASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEYPASS:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          ALIAS:     ${{ secrets.ANDROID_KEY_ALIAS }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            **/*.aab
            **/*.apk

  # ---------------- iOS build (optional) ----------------
  ios_build:
    if: ${{ vars.DO_IOS_BUILD == '1' }}
    needs: autopilot
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # If you use CocoaPods:
      - name: Install CocoaPods
        run: |
          gem install cocoapods --no-document
          pod install --project-directory=ios || true

      - name: Build (scheme/workspace placeholders)
        run: |
          xcodebuild \
            -workspace ios/YourApp.xcworkspace \
            -scheme YourApp \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/YourApp.xcarchive archive

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath build/YourApp.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ios/exportOptions.plist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/export/*.ipa

# .github/workflows/android.main.yml
name: Build & (optional) Upload TWA AAB
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  SITE_URL: https://aikya.space
  WEB_MANIFEST_URL: https://aikya.space/manifest.json
  APP_NAME: Aikya Autopilot
  PACKAGE_ID: ${{ secrets.ANDROID_PACKAGE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm i -g @bubblewrap/cli

      # Keystore recreate
      - name: Recreate upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          ls -l upload-keystore.jks

      # Init + Build
      - name: Init Bubblewrap project
        run: |
          npx @bubblewrap/cli init \
            --url "$SITE_URL" \
            --manifest "$WEB_MANIFEST_URL" \
            --packageId "$PACKAGE_ID" \
            --name "$APP_NAME" \
            --directory android
          ls -la android

      - name: Build AAB (release)
        working-directory: android
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS:           ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          bubblewrap build \
            --signingKey ../upload-keystore.jks \
            --signingKeyAlias "$ANDROID_KEY_ALIAS"
          ls -lah app/build/outputs/bundle/release

      - uses: actions/upload-artifact@v4
        with:
          name: aikya-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # Optional Play upload (guarded)
      - name: Upload to Google Play (internal)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

name: deploy-backend
on: [push]
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # (यदि GCP OIDC उपयोग करेंगे)
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      # वैकल्पिक: JSON को फाइल में लिखना (यदि कुछ लाइब्रेरी path माँगें)
      - name: Write SA to file
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > sa.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$GITHUB_WORKSPACE/sa.json" >> $GITHUB_ENV

      - run: npm ci
      - run: npm run build
      - run: npm test

      # उदाहरण: Cloud Run पर डिप्लॉय (key आधारित)
      - name: Auth to GCP (key file)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: aikya-backend
          region: asia-south1
          source: .

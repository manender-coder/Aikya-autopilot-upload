# Create the "Aikya Final Merge" infra bundle with Terraform, GitHub Actions, and helper scripts
import os, zipfile, textwrap, json, pathlib

base = "/mnt/data/aikya-final-merge"
paths = [
    base,
    f"{base}/infra",
    f"{base}/infra/terraform",
    f"{base}/.github",
    f"{base}/.github/workflows",
    f"{base}/scripts"
]
for p in paths:
    os.makedirs(p, exist_ok=True)

# ---------- Terraform files ----------
provider_tf = textwrap.dedent("""
    terraform {
      required_version = ">= 1.6.0"
      required_providers {
        google = {
          source  = "hashicorp/google"
          version = ">= 5.0.0"
        }
      }
      backend "gcs" {
        bucket = "knowledge-base-bucket-aikya-charevati"
        prefix = "tfstate/final-merge"
      }
    }
    
    provider "google" {
      project = var.project_id
      region  = var.region
    }
    
    # Reference existing bucket
    data "google_storage_bucket" "aikya" {
      name = var.bucket_name
    }
""").strip()

main_tf = textwrap.dedent("""
    # Optional (advanced): manage bucket settings via Terraform.
    # If the bucket already exists, import it first:
    #   terraform import google_storage_bucket.aikya var.bucket_name
    # Then apply to enforce settings.
    resource "google_storage_bucket" "aikya" {
      name     = var.bucket_name
      location = var.bucket_location
      project  = var.project_id
    
      # Safety
      force_destroy = false
    
      # Security hardening
      uniform_bucket_level_access = true
      public_access_prevention    = "enforced"
    
      versioning {
        enabled = true
      }
    
      lifecycle_rule {
        action { type = "Delete" }
        condition {
          age = 365
        }
      }
    }
    
    # IAM Bindings
    resource "google_storage_bucket_iam_binding" "admins" {
      bucket = var.bucket_name
      role   = "roles/storage.admin"
      members = var.members_admin
    }
    
    resource "google_storage_bucket_iam_binding" "object_admins" {
      bucket = var.bucket_name
      role   = "roles/storage.objectAdmin"
      members = var.members_object_admin
    }
    
    resource "google_storage_bucket_iam_binding" "viewers" {
      bucket = var.bucket_name
      role   = "roles/storage.objectViewer"
      members = var.members_viewer
    }
""").strip()

variables_tf = textwrap.dedent("""
    variable "project_id" {
      description = "GCP Project ID"
      type        = string
    }
    
    variable "region" {
      description = "Default region for Google provider (storage is multi-regional by nature)"

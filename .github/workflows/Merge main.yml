# ---------- GitHub Actions workflow ----------
deploy_yml = textwrap.dedent("""
    name: Aikya Final Merge Deploy
    
    on:
      push:
        branches: [ "main" ]
      workflow_dispatch: {}
    
    concurrency:
      group: aikya-final-merge
      cancel-in-progress: false
    
    jobs:
      deploy:
        runs-on: ubuntu-latest
        permissions:
          contents: read
          id-token: write
        steps:
          - name: Checkout
            uses: actions/checkout@v4
    
          - name: Setup Node
            uses: actions/setup-node@v4
            with:
              node-version: '20'
    
          - name: Setup gcloud
            uses: google-github-actions/setup-gcloud@v2
            with:
              install_components: 'gcloud,gsutil'
    
          - name: Auth to GCP (Service Account JSON)
            uses: google-github-actions/auth@v2
            with:
              credentials_json: ${{ secrets.GCP_SA_KEY }}
    
          - name: Verify GCS bucket
            run: |
              gsutil ls -L -b gs://${{ secrets.AIKYA_BUCKET_NAME }}
    
          - name: Upload build artifacts to GCS (optional example)
            if: ${{ hashFiles('dist/**') != '' }}
            run: |
              gsutil -m rsync -r -d dist gs://${{ secrets.AIKYA_BUCKET_NAME }}/web-dist
    
          - name: Firebase Deploy
            if: ${{ env.FIREBASE_DEPLOY == '1' }}
            env:
              FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
            run: |
              npm i -g firebase-tools
              firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }}
    
          - name: Vercel Deploy (Build & Prod)
            env:
              VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
            run: |
              npm i -g vercel
              vercel pull --yes --environment=production --token $VERCEL_TOKEN
              vercel build --prod --token $VERCEL_TOKEN
              vercel deploy --prebuilt --prod --token $VERCEL_TOKEN
    
          - name: Caption/Autonorm sync (hook)
            run: |
              echo "Triggering caption-autonorm sync…"
              # curl -X POST ${{ secrets.CAPTION_SYNC_URL }} -H "Authorization: Bearer ${{ secrets.CAPTION_SYNC_TOKEN }}"
    
          - name: Summary
            run: |
              echo "Aikya Final Merge pipeline complete."
""").strip()

with open(f"{base}/.github/workflows/aikya-final-merge.yml", "w") as f:
    f.write(deploy_yml + "\n")

# ---------- Scripts ----------
verify_sh = textwrap.dedent("""
    #!/usr/bin/env bash
    set -euo pipefail
    
    BUCKET="${1:-knowledge-base-bucket-aikya-charevati}"
    
    echo "== Bucket info =="
    gsutil ls -L -b "gs://${BUCKET}"
    
    echo "== IAM Policy =="
    gcloud storage buckets get-iam-policy "${BUCKET}" --format=json | jq .
    
    echo "== Signed URL test (requires an object) =="
    OBJ="$(gsutil ls "gs://${BUCKET}"/** | head -n1 || true)"
    if [ -n "$OBJ" ]; then
      echo "Testing signed URL for: $OBJ"
      gcloud storage sign-url --method=GET --expires-in=1h "$OBJ" || true
    else
      echo "No objects found to sign."
    fi
""").strip()

os.chmod(f"{base}/scripts", 0o755)
with open(f"{base}/scripts/verify.sh", "w") as f:
    f.write(verify_sh + "\n")
os.chmod(f"{base}/scripts/verify.sh", 0o755)

# ---------- README ----------
readme = textwrap.dedent("""

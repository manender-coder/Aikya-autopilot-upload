name: Build & (optional) Upload TWA AAB

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  SITE_URL: https://aikya.space
  WEB_MANIFEST_URL: https://aikya.space/manifest.json
  APP_NAME: Aikya Autopilot
  # Uses your secret for the final package name (e.g. com.aikya.spiritual.platform)
  PACKAGE_ID: ${{ secrets.ANDROID_PACKAGE_NAME }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm i -g @bubblewrap/cli

      # ---- Signing: recreate keystore from base64 secret ----
      - name: Recreate upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          ls -l upload-keystore.jks

      # ---- Create the Android project with Bubblewrap ----
      - name: Init Bubblewrap project
        run: |
          npx @bubblewrap/cli init \
            --url "$SITE_URL" \
            --manifest "$WEB_MANIFEST_URL" \
            --packageId "$PACKAGE_ID" \
            --name "$APP_NAME" \
            --directory android

      # ---- Build signed AAB ----
      - name: Build AAB (release)
        working-directory: android
        env:
          # Bubblewrap reads passwords from these env vars
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          bubblewrap build \
            --signingKey ../upload-keystore.jks \
            --signingKeyAlias "$ANDROID_KEY_ALIAS"
          ls -lah app/build/outputs/bundle/release

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aikya-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      # ---- OPTIONAL: Push to Google Play (Internal track) ----
      - name: Upload to Google Play (internal)
        if: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: draft

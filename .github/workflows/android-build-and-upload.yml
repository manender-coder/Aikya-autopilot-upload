name: Android AAB → Play (Internal)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: play-upload-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # OPTIONAL: Gradle cache – build tez hoga
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode keystore
        shell: bash
        run: |
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > upload-keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      # Agar app/ ke gradle me signConfig use ho raha hai to env pass karo
      - name: Build AAB (release)
        run: |
          ./gradlew clean bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/upload-keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}

      - name: Upload to Play (internal)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal

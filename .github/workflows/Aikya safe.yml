name: Aikya • Safe Deploy → Zapier → BigQuery

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: "17 * * * *"   # hourly

concurrency:
  group: aikya-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: ${{ secrets.NODE_VERSION || '18' }}

jobs:
  deploy_and_log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: ${{ env.NODE_VERSION }} }

      - name: Install deps (tolerant)
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          elif [ -f yarn.lock ]; then
            corepack enable || true
            yarn install --frozen-lockfile || yarn install
          elif [ -f package.json ]; then
            npm i --no-audit --no-fund --legacy-peer-deps || true
          else
            echo "No package.json, skipping install"
          fi

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT || vars.SERVICE_ACCOUNT }}' > $HOME/fb.json

      - name: Firebase Deploy (skip if not configured)
        if: ${{ secrets.FIREBASE_PROJECT_ID != '' }}
        env: { GOOGLE_APPLICATION_CREDENTIALS: $HOME/fb.json }
        run: |
          npm i -g firebase-tools || true
          firebase use ${{ secrets.FIREBASE_PROJECT_ID }} || true
          firebase deploy --non-interactive --force || true

      - name: Notify Zapier (GitHub → Zapier → BigQuery)
        run: |
          if [ -n "${{ secrets.ZAPIER_DEPLOY_HOOK_URL }}" ]; then
            payload=$(cat <<'JSON'
{
  "kind": "deploy",
  "ts": "__TS__",
  "repo": "__REPO__",
  "sha": "__SHA__",
  "status": "safe-deploy",
  "run": "__RUN__"
}
JSON
)
            payload="${payload/__TS__/$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
            payload="${payload/__REPO__/${{ github.repository }}}"
            payload="${payload/__SHA__/${{ github.sha }}}"
            payload="${payload/__RUN__/${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}}"
            curl -sS -X POST "${{ secrets.ZAPIER_DEPLOY_HOOK_URL }}" \
              -H 'Content-Type: application/json' -d "${payload}"
          else
            echo "No ZAPIER_DEPLOY_HOOK_URL configured; skipping webhook."
          fi

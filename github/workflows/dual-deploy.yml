name: Aikya Dual Deploy (Vercel + Firebase) — Lockless & Error-Proof

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: dual-deploy
  cancel-in-progress: false

env:
  # Vercel (deploy auth)
  VERCEL_TOKEN:        ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID:       ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID:   ${{ secrets.VERCEL_PROJECT_ID }}

  # Firebase (either use FIREBASE_SERVICE_ACCOUNT+FIREBASE_PROJECT_ID OR FIREBASE_TOKEN)
  FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
  FIREBASE_PROJECT_ID:      ${{ secrets.FIREBASE_PROJECT_ID }}
  FIREBASE_TOKEN:           ${{ secrets.FIREBASE_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (no lockfile required)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps (lockless)
        run: |
          if [ -f package.json ]; then
            npm install --no-audit --no-fund || true
          else
            echo "No package.json; skipping install."
          fi

      - name: Build (best-effort)
        run: |
          if [ -f package.json ]; then
            if jq -e '.scripts.build' package.json > /dev/null; then
              npm run build || echo "Build failed; continuing."
            else
              echo "No build script; continuing."
            fi
          fi

      # ---------- Vercel Deploy ----------
      - name: Vercel Deploy (conditional)
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ]; then
            echo "▶ Vercel deploy..."
            npx vercel pull --yes --environment=production \
              --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" \
              ${VERCEL_PROJECT_ID:+--project "$VERCEL_PROJECT_ID"} || true
            npx vercel build --token "$VERCEL_TOKEN" || true
            npx vercel deploy --prebuilt --prod \
              --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID" \
              ${VERCEL_PROJECT_ID:+--project "$VERCEL_PROJECT_ID"} || true
            echo "✅ Vercel step finished"
          else
            echo "⏭️ Skipping Vercel (VERCEL_* secrets missing)"
          fi

      # ---------- Firebase Deploy ----------
      - name: Firebase Deploy (conditional)
        run: |
          if [ -f firebase.json ]; then
            if [ -n "$FIREBASE_PROJECT_ID" ] && [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
              echo "▶ Firebase deploy with service account..."
              npm i -g firebase-tools >/dev/null 2>&1
              echo "$FIREBASE_SERVICE_ACCOUNT" > $RUNNER_TEMP/fb.json
              export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/fb.json"
              firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID" || true
              echo "✅ Firebase (SA) finished"
            elif [ -n "$FIREBASE_TOKEN" ]; then
              echo "▶ Firebase deploy with token..."
              npm i -g firebase-tools >/dev/null 2>&1
              firebase deploy --only hosting --token "$FIREBASE_TOKEN" || true
              echo "✅ Firebase (token) finished"
            else
              echo "⏭️ Skipping Firebase (missing creds)"
            fi
          else
            echo "⏭️ Skipping Firebase (firebase.json not found)"
          fi

      - name: Summary
        run: |
          echo "### Dual Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Lockfile not required (npm install used)" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel: attempted if VERCEL_* present" >> $GITHUB_STEP_SUMMARY
          echo "- Firebase: attempted if firebase.json + (SA or TOKEN) present" >> $GITHUB_STEP_SUMMARY
